<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Name Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
}
.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}
input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
}
button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}
.primary{background:#4CAF50;color:white;}
.secondary{background:#2196F3;color:white;}
#qrcode{margin-top:20px;min-height:240px;}
.bulkResult{
margin-top:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}
.bulkItem{
background:#fafafa;
padding:10px;
border-radius:10px;
}
progress{
width:100%;
height:20px;
margin-top:10px;
}


#qrCard{
  width:2.1in;
  height:2.75in;
  background:white;
  border:2px solid #000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between; /* 🔥 better spacing */
  padding:12px 6px;
  box-sizing:border-box;
}

/* QR */
#qrcode{
  display:flex;
  justify-content:center;
  align-items:center;
}

#qrcode canvas{
  width:1.75in !important;
  height:1.75in !important;
}

/* LAST NAME */
#lastDisplay{
  font-size:28px;
  font-weight:900;
  margin:0;
  text-transform:uppercase;
  font-family:"Times New Roman", serif;
  line-height:1;
}

/* FIRST NAME */
#fullDisplay{
  font-size:14px;
  margin:0;
  letter-spacing:2px;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>QR Generator for co-MIS</h2>

<button class="secondary" onclick="showSingle()">Single</button>
<button class="secondary" onclick="showBulk()">Bulk</button>

<div id="singleSection">

<input id="firstName" placeholder="First Name" onkeyup="generateQR()">
<input id="middleName" placeholder="Middle Name" onkeyup="generateQR()">
<input id="lastName" placeholder="Last Name" onkeyup="generateQR()">
<input id="suffix" placeholder="Suffix" onkeyup="generateQR()">

<div id="qrCard">
  <div id="qrcode"></div>
  <h1 id="lastDisplay"></h1>
  <p id="fullDisplay"></p>
</div>

<button id="downloadBtn" class="primary" onclick="downloadQR()" style="display:none">
Download QR
</button>

</div>

<div id="bulkSection" style="display:none">

<textarea id="bulkNames" rows="6"
placeholder="One name per line"></textarea>

<p id="status"></p>
<progress id="progressBar" value="0" max="100" style="display:none"></progress>

<button class="primary" onclick="generateBulk()">Generate Bulk</button>

<button id="downloadZip" class="primary" onclick="downloadZip()" style="display:none">
Download ZIP
</button>

<div class="bulkResult" id="bulkResult"></div>

</div>

<div id="hiddenQR" style="display:none"></div>

</div>

<script>

let qrText="";

function showSingle(){
document.getElementById("singleSection").style.display="block";
document.getElementById("bulkSection").style.display="none";
}

function showBulk(){
document.getElementById("singleSection").style.display="none";
document.getElementById("bulkSection").style.display="block";
}

function generateQR(){

let first = document.getElementById("firstName").value.trim();
let middle = document.getElementById("middleName").value.trim();
let last = document.getElementById("lastName").value.trim();
let suffix = document.getElementById("suffix").value.trim();

let qrContainer = document.getElementById("qrcode");
let downloadBtn = document.getElementById("downloadBtn");

if(!first || !last){
  qrContainer.innerHTML="";
  downloadBtn.style.display="none";
  return;
}

let fullname = suffix
? `${last}, ${first} ${suffix}${middle ? " " + middle : ""}`
: `${last}, ${first}${middle ? " " + middle : ""}`;

qrText=fullname;

/* QR */
$(qrContainer).empty().qrcode({
text: fullname,
width: 220,
height: 220
});

/* DISPLAY TEXT */
document.getElementById("lastDisplay").innerText = last.toUpperCase();
document.getElementById("fullDisplay").innerText =
[first, middle].filter(Boolean).join(" ").toUpperCase();

downloadBtn.style.display="inline-block";
}

function downloadQR(){

let card = document.getElementById("qrCard");

html2canvas(card, {
    scale: 3, // 🔥 increases quality (VERY IMPORTANT)
    useCORS: true
}).then(canvas=>{

    // convert to high-quality PNG
    let link=document.createElement("a");
    link.href=canvas.toDataURL("image/png");
    link.download=qrText+".png";
    link.click();

});

}

async function generateBulk(){

let names = bulkNames.value
.split("\n")
.map(n=>n.trim())
.filter(n=>n);

if(names.length === 0) return;

if(names.length > 5000){
  alert("Max 5000 names");
  return;
}

let zip = new JSZip();

let progressBar = document.getElementById("progressBar");
let status = document.getElementById("status");
let downloadZipBtn = document.getElementById("downloadZip");

progressBar.style.display = "block";
progressBar.value = 0;
downloadZipBtn.style.display = "none";

for(let i=0; i<names.length; i++){

  let name = names[i];

  status.innerText = `Generating ${i+1}/${names.length}`;
  progressBar.value = (i / names.length) * 100;

  /* CREATE CARD */
  let tempCard = document.createElement("div");
  tempCard.style.width = "2.1in";
  tempCard.style.height = "2.75in";
  tempCard.style.border = "2px solid black";
  tempCard.style.display = "flex";
  tempCard.style.flexDirection = "column";
  tempCard.style.alignItems = "center";
  tempCard.style.justifyContent = "space-between";
  tempCard.style.padding = "12px 6px";
  tempCard.style.boxSizing = "border-box";
  tempCard.style.background = "white";

  /* QR */
  let qrDiv = document.createElement("div");
  tempCard.appendChild(qrDiv);

  $(qrDiv).empty().qrcode({
    text: name,
    width: 220,
    height: 220
  });

  /* PARSE NAME */
  let last = "";
  let firstPart = "";

  if(name.includes(",")){
    let parts = name.split(",");
    last = parts[0].trim();
    firstPart = (parts[1] || "").trim();
  }else{
    let parts = name.split(" ");
    last = parts.pop();
    firstPart = parts.join(" ");
  }

  /* TEXT */
  let lastEl = document.createElement("h1");
  lastEl.innerText = last.toUpperCase();
  lastEl.style.fontSize = "28px";
  lastEl.style.fontWeight = "900";
  lastEl.style.margin = "0";
  lastEl.style.fontFamily = "Times New Roman, serif";

  let firstEl = document.createElement("p");
  firstEl.innerText = firstPart.toUpperCase();
  firstEl.style.fontSize = "14px";
  firstEl.style.margin = "0";
  firstEl.style.letterSpacing = "2px";

  tempCard.appendChild(lastEl);
  tempCard.appendChild(firstEl);

  /* WAIT for QR render */
  await new Promise(r=>setTimeout(r,30));

  /* CAPTURE */
  let canvas = await html2canvas(tempCard, {
    scale: 4
  });

  let data = canvas.toDataURL().split(",")[1];

  let clean = name
    .toLowerCase()
    .replace(/[^a-z0-9]+/gi,"_")
    .replace(/^_|_$/g,"");

  zip.file(clean + ".png", data, { base64: true });

  /* prevent freeze */
  if(i % 20 === 0){
    await new Promise(r=>setTimeout(r,10));
  }
}

window.generatedZip = zip;

progressBar.value = 100;
status.innerText = "Done!";
downloadZipBtn.style.display = "inline-block";
}


async function downloadZip(){
if(!window.generatedZip) return;

let status = document.getElementById("status");
status.innerText = "Zipping...";

let blob = await window.generatedZip.generateAsync({type:"blob"});

let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="QR_Cards.zip";
link.click();

status.innerText="Download complete!";
}

</script>

</body>
</html>
